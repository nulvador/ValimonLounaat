<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Päivän lounas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Kesäteema – aurinko, meri ja hiekka */
      --sun:       #FFB627;  /* auringonkeltainen */
      --coral:     #FF6B57;  /* korallinpunainen */
      --sea:       #0FA3B1;  /* merenvihreä turkoosi */
      --sky:       #6FC7E1;  /* taivaansininen */

      --bg:        #FFF8EC;  /* lämmin hiekka */
      --bg-card:   #FFFFFF;
      --ink:       #2B2118;  /* tumma pähkinä */
      --ink-2:     #6E5C4B;
      --ink-3:     #B9A48E;
      --accent:    #FF6B57;
      --accent-lt: #FFEEE3;
      --border:    #F0DFC8;
      --closed:    #A08C77;
      --tag-bg:    #FFF3D6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Kesäyö – lämmin iltahämärä */
        --bg:        #1A1620;
        --bg-card:   #241E2B;
        --ink:       #F7ECDF;
        --ink-2:     #C3AE9A;
        --ink-3:     #6E5C4B;
        --accent:    #FFB627;
        --accent-lt: #2E2418;
        --border:    #3A3040;
        --closed:    #A08C77;
        --tag-bg:    #2E2418;
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image: linear-gradient(180deg, rgba(255,182,39,0.10) 0%, rgba(255,107,87,0.05) 220px, transparent 480px);
      color: var(--ink);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-image: linear-gradient(180deg, rgba(255,182,39,0.07) 0%, rgba(255,107,87,0.04) 220px, transparent 480px);
      }
    }

    header {
      max-width: 860px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, var(--sun), var(--coral), var(--sea)) 1;
      padding-bottom: 1rem;
    }

    .site-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(1.7rem, 4.5vw, 2.4rem);
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.02em;
      font-optical-sizing: auto;
    }

    .site-title .sun-dot {
      display: inline-block;
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFD46B, var(--sun));
      box-shadow: 0 0 12px rgba(255,182,39,0.55);
      margin-left: 0.25em;
      vertical-align: baseline;
    }

    .site-date {
      font-size: 0.82rem;
      color: var(--ink-2);
      font-weight: 400;
      background: var(--tag-bg);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
    }

    .cards {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: box-shadow 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--sun), var(--coral), var(--sea));
      opacity: 0.85;
    }

    .card:hover {
      box-shadow: 0 6px 26px rgba(255,140,60,0.14);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1.2;
      color: var(--ink);
      font-optical-sizing: auto;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--ink-2);
    }

    .meta-row svg {
      width: 13px; height: 13px;
      flex-shrink: 0;
      stroke: var(--ink-3);
    }

    .price-tag {
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--tag-bg);
      color: #B26A00;
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
      white-space: nowrap;
      align-self: flex-start;
    }

    @media (prefers-color-scheme: dark) {
      .price-tag { color: var(--sun); }
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    /* Ruokalista */
    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-item {
      font-size: 0.88rem;
      line-height: 1.45;
      color: var(--ink);
      padding-left: 0.9rem;
      position: relative;
    }

    .menu-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--sea);
      opacity: 0.9;
    }

    .menu-item:nth-child(even)::before { background: var(--coral); }
    .menu-item:nth-child(3n)::before   { background: var(--sun); }

    .menu-item .kat {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      display: block;
      margin-bottom: 0.1rem;
    }

    /* Suljettu-tila */
    .closed-banner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.88rem;
      color: var(--closed);
      font-style: italic;
      padding: 0.6rem 0;
    }

    /* Lomatila – himmennetty kortti + palmubanneri */
    .card.on-holiday {
      opacity: 0.72;
      order: 10; /* siirtää lomaravintolat loppuun */
    }
    .card.on-holiday::before {
      background: linear-gradient(90deg, var(--sun), var(--coral));
      opacity: 0.4;
    }
    .card.on-holiday:hover {
      opacity: 0.92;
    }
    .holiday-banner {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.4;
      color: var(--ink-2);
      background: var(--tag-bg);
      border-radius: 12px;
      padding: 0.7rem 0.85rem;
    }
    .holiday-banner .emoji {
      font-size: 1.05rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .holiday-badge {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #B26A00;
      background: var(--tag-bg);
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
      white-space: nowrap;
      align-self: flex-start;
    }
    @media (prefers-color-scheme: dark) {
      .holiday-badge { color: var(--sun); }
    }

    /* Virhe */
    .error-note {
      font-size: 0.82rem;
      color: var(--ink-3);
      font-style: italic;
    }

    /* Päivitysaika */
    .footer {
      max-width: 860px;
      margin: 2.5rem auto 0;
      text-align: center;
      font-size: 0.76rem;
      color: var(--ink-3);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--ink-2);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    .refresh-btn:hover { background: var(--border); }

    /* Loading skeleton */
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .skel {
      background: var(--border);
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* External link icon shown on hover */
    .ext-link {
      font-size: 0.72rem;
      color: var(--ink-3);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      margin-top: auto;
      padding-top: 0.4rem;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover .ext-link { opacity: 1; }
  </style>
</head>
<body>

<div style="text-align:right;padding:0.4rem 1.2rem 0;font-size:0;line-height:1;">
  <span style="display:inline-block;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#fff;background:linear-gradient(90deg,#FF6B57,#FFB627);border-radius:20px;padding:0.2rem 0.7rem;">α alpha · testiversio</span>
</div>
<header>
  <h1 class="site-title">Päivän lounas<span class="sun-dot" aria-hidden="true"></span></h1>
  <span class="site-date" id="header-date">–</span>
</header>

<div class="cards" id="cards">
  <!-- Skeleton loaders -->
  <div class="skeleton-card">
    <div class="skel" style="height:22px;width:55%"></div>
    <div class="skel" style="height:12px;width:40%"></div>
    <div class="skel" style="height:1px;width:100%"></div>
    <div class="skel" style="height:12px;width:90%"></div>
    <div class="skel" style="height:12px;width:75%"></div>
    <div class="skel" style="height:12px;width:82%"></div>
  </div>
  <div class="skeleton-card">
    <div class="skel" style="height:22px;width:60%"></div>
    <div class="skel" style="height:12px;width:35%"></div>
    <div class="skel" style="height:1px;width:100%"></div>
    <div class="skel" style="height:12px;width:85%"></div>
    <div class="skel" style="height:12px;width:70%"></div>
    <div class="skel" style="height:12px;width:90%"></div>
    <div class="skel" style="height:12px;width:60%"></div>
  </div>
  <div class="skeleton-card">
    <div class="skel" style="height:22px;width:50%"></div>
    <div class="skel" style="height:12px;width:45%"></div>
    <div class="skel" style="height:1px;width:100%"></div>
    <div class="skel" style="height:12px;width:88%"></div>
    <div class="skel" style="height:12px;width:72%"></div>
    <div class="skel" style="height:12px;width:95%"></div>
  </div>
</div>

<div class="footer">
  <div id="update-time">Ladataan...</div>
  <button class="refresh-btn" onclick="loadData()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
    </svg>
    Päivitä
  </button>
</div>

<script>
const DAYS_FI = ["sunnuntai","maanantai","tiistai","keskiviikko","torstai","perjantai","lauantai"];
const MONTHS_FI = ["tammikuuta","helmikuuta","maaliskuuta","huhtikuuta","toukokuuta","kesäkuuta","heinäkuuta","elokuuta","syyskuuta","lokakuuta","marraskuuta","joulukuuta"];

function formatDate(d) {
  return `${DAYS_FI[d.getDay()]} ${d.getDate()}. ${MONTHS_FI[d.getMonth()]} ${d.getFullYear()}`;
}

function formatTime(iso) {
  const d = new Date(iso);
  const days = ["su","ma","ti","ke","to","pe","la"];
  const day = days[d.getDay()];
  const date = `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
  const time = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  return `Päivitetty ${day} ${date} klo ${time}`;
}

// Parsee "Lounas: Broileria saltimboccaa" → {kat, ruoka}
function parseItem(str) {
  const idx = str.indexOf(": ");
  if (idx > -1 && idx < 25) {
    return { kat: str.slice(0, idx), ruoka: str.slice(idx + 2) };
  }
  return { kat: null, ruoka: str };
}

// Tunnistaa lomalla/kiinni olevat ravintolat ruokalistan tekstistä.
// Data ei merkitse lomaa erikseen, joten päättely tehdään sisällöstä.
function detectHoliday(r) {
  if (r.virhe) return null;
  const HOLIDAY_RE = /(kiinni|suljettu|lomalla|kesäloma|kesätauko|tervetuloa\s+jälleen|avaamme|avataan\s+taas|palaamme)/i;
  // Lyhyt lista, jossa jokin rivi kertoo sulkemisesta = todennäköisesti loma
  const hits = r.ruoat.filter(it => HOLIDAY_RE.test(it));
  if (hits.length > 0 && r.ruoat.length <= 3) {
    // Poimitaan selkein viesti (pisin osuma) bannerin tekstiksi
    let msg = hits.sort((a, b) => b.length - a.length)[0];
    msg = msg.replace(/^[^:]{1,25}:\s*/, ""); // pudota mahdollinen "Buffet:" -etuliite
    return msg.trim();
  }
  return null;
}

function renderCard(r) {
  const card = document.createElement("div");
  card.className = "card";

  const isClosed = !!r.virhe;
  const holidayMsg = detectHoliday(r);
  const onHoliday = !!holidayMsg;
  const noMenu   = !r.virhe && !onHoliday && r.ruoat.length === 0;

  if (onHoliday) card.classList.add("on-holiday");

  card.innerHTML = `
    <div class="card-header">
      <h2 class="card-name">${r.nimi}</h2>
      ${onHoliday ? `<span class="holiday-badge">Lomalla</span>` : ""}
    </div>
    ${r.hinta && !isClosed && !onHoliday ? `<div style="margin-top:-0.3rem;"><span class="price-tag">${r.hinta}</span></div>` : ""}
    <div class="card-meta">
      <div class="meta-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        ${r.auki}
      </div>
    </div>
    <div class="divider"></div>
    ${isClosed
      ? `<div class="closed-banner">
           <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
           </svg>
           ${r.virhe}
         </div>`
      : onHoliday
      ? `<div class="holiday-banner">
           <span class="emoji" aria-hidden="true">🌴</span>
           <span>${holidayMsg}</span>
         </div>`
      : noMenu
      ? `<p class="error-note">Ruokalista ei ole vielä saatavilla.</p>`
      : `<ul class="menu-list">${r.ruoat.map(item => {
           const p = parseItem(item);
           return `<li class="menu-item">${p.kat ? `<span class="kat">${p.kat}</span>` : ""}${p.ruoka}</li>`;
         }).join("")}</ul>`
    }
    <a class="ext-link" href="${r.url}" target="_blank" rel="noopener">
      Avaa ravintolan sivu
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      </svg>
    </a>
  `;

  return card;
}

async function loadData() {
  document.getElementById("update-time").textContent = "Ladataan...";

  try {
    // Lisää cache-buster jotta selain ei käytä vanhaa JSONia
    const resp = await fetch(`lounaat.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error("Tiedostoa ei löydy");
    const data = await resp.json();

    // Otsikko
    const now = new Date();
    document.getElementById("header-date").textContent = formatDate(now);
    document.getElementById("update-time").textContent = formatTime(data.paivitetty);

    // Kortit
    const container = document.getElementById("cards");
    container.innerHTML = "";
    data.ravintolat.forEach((r, i) => {
      const card = renderCard(r);
      card.style.animationDelay = `${i * 0.06}s`;
      container.appendChild(card);
    });

  } catch (e) {
    document.getElementById("cards").innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--ink-2)">
        <p style="font-size:1rem;margin-bottom:0.5rem">Ruokalistan lataaminen epäonnistui.</p>
        <p style="font-size:0.82rem;color:var(--ink-3)">Varmista että <code>scraper.py</code> on ajettu tänään ja <code>lounaat.json</code> on samassa kansiossa.</p>
      </div>`;
    document.getElementById("update-time").textContent = "Virhe: " + e.message;
  }
}

// Käynnistys
document.getElementById("header-date").textContent = formatDate(new Date());
loadData();
</script>

</body>
</html>
